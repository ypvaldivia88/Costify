name: Android APK Preview

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  EXPO_PUBLIC_API_URL: https://costify-iota.vercel.app

jobs:
  build-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK packages
        shell: bash
        run: |
          set -e
          for attempt in 1 2 3; do
            if sdkmanager \
              "platform-tools" \
              "platforms;android-36" \
              "build-tools;36.0.0" \
              "cmake;3.22.1" \
              "ndk;27.1.12297006"; then
              break
            fi
            echo "sdkmanager attempt ${attempt} failed, retrying..."
            sleep 15
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Read app version
        id: meta
        working-directory: apps/mobile
        run: |
          VERSION=$(node -p "require('./app.json').expo.version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Preview version: ${VERSION}"

      - name: Prebuild Android project
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.1.12297006
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -x lintVitalAnalyzeRelease \
            -PreactNativeArchitectures=arm64-v8a

      - name: Prepare preview artifact
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          cp apps/mobile/android/app/build/outputs/apk/release/app-release.apk \
            "costify-preview.v${VERSION}.${SHORT_SHA}.apk"

      - name: Upload preview APK
        uses: actions/upload-artifact@v4
        with:
          name: costify-preview-v${{ steps.meta.outputs.version }}-${{ github.sha }}
          path: costify-preview.v${{ steps.meta.outputs.version }}.*.apk
          retention-days: 14
          if-no-files-found: error
